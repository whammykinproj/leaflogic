name: Generate & Deploy Content

on:
  schedule:
    # Runs every day at 6am UTC (1am EST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger with configurable batch size
    inputs:
      batch_size:
        description: 'Number of articles to generate'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # --- RESEARCH ---
      - name: Keyword Scout
        run: npx tsx agents/01-keyword-scout.ts

      # --- CREATE ---
      - name: Content Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
        run: npx tsx agents/02-content-writer.ts

      # --- OPTIMIZE ---
      - name: Internal Linker
        run: npx tsx agents/03-internal-linker.ts

      - name: Affiliate Injector
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: npx tsx agents/05-affiliate-injector.ts

      - name: SEO Auditor
        run: npx tsx agents/08-seo-auditor.ts

      - name: Sitemap Generator
        run: npx tsx agents/04-sitemap-generator.ts

      # --- PROMOTE ---
      - name: Google & Bing Indexer
        run: npx tsx agents/06-google-indexer.ts

      - name: Social Post Generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx agents/07-social-poster.ts

      # --- DEPLOY ---
      - name: Commit and Push
        run: |
          git config user.name "LeafLogic Bot"
          git config user.email "bot@leaflogic.app"
          git add content/ public/ agents/data/ agents/social/

          if git diff --staged --quiet; then
            echo "No new content generated."
          else
            ARTICLE_COUNT=$(git diff --staged --name-only -- content/articles/ | wc -l | tr -d ' ')
            git commit -m "Auto-publish: ${ARTICLE_COUNT} articles + affiliate links + social posts

            Generated by LeafLogic content pipeline"
            git push
          fi
